name: Promote to Stable

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Stable version tag (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: load-generator
            context: ./load-generator
          - service: load-generator-orm
            context: ./load-generator-orm
          - service: pgbench-runner
            context: ./pgbench-runner
          - service: dashboard
            context: ./dashboard
          - service: truth-service
            context: ./truth-service
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.event.inputs.version }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
          labels: |
            org.opencontainers.image.version=${{ github.event.inputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

  publish:
    name: Publish Stable Release
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create tag
        run: |
          VERSION=${{ github.event.inputs.version }}
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists"
          else
            git tag "$VERSION"
            git push origin "$VERSION"
          fi

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ github.event.inputs.version }}
          SEMVER="${VERSION#v}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "$VERSION" | grep -v "\-rc" | head -1 || true)

          {
            if [ -f CHANGELOG.md ]; then
              NOTES=$(awk -v ver="$SEMVER" '/^## \[/{if(f)exit;if(index($0,"["ver"]"))f=1;next}f' CHANGELOG.md)
              [ -n "$NOTES" ] && echo "${NOTES}" && echo ""
            fi

            if [ -n "$PREV_TAG" ]; then
              echo "## All changes since ${PREV_TAG}"
              echo ""
              git log ${PREV_TAG}..HEAD --pretty=format:"- %s (\`%h\`)" --no-merges | head -80
              echo ""
            fi

            echo ""
            echo "## Docker Images"
            echo ""
            echo "Multi-arch: \`linux/amd64\` + \`linux/arm64\`"
            echo ""
            echo "| Service | Pull |"
            echo "|---------|------|"
            for svc in load-generator load-generator-orm pgbench-runner dashboard truth-service; do
              echo "| ${svc} | \`docker pull ghcr.io/${{ github.repository }}/${svc}:${VERSION}\` |"
            done
            echo ""
            echo "## Quick Start"
            echo ""
            echo '```bash'
            echo "git clone https://github.com/${{ github.repository }}.git"
            echo "cd pg-stress && git checkout ${VERSION}"
            echo "make up-full"
            echo '```'
          } > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ github.event.inputs.version }}
          gh release delete "$VERSION" --yes 2>/dev/null || true
          gh release create "$VERSION" \
            --repo ${{ github.repository }} \
            --title "pg-stress ${VERSION}" \
            --notes-file /tmp/release-notes.md \
            --target ${{ github.sha }} \
            --latest

      - name: Update docs with stable release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ github.event.inputs.version }}
          REPO: ${{ github.repository }}
        run: |
          DATE=$(date -u '+%Y-%m-%d')
          GHCR="ghcr.io/${REPO}"
          RELEASES_URL="https://github.com/${REPO}/releases"

          # ── Build release table ──
          RELEASE_ROWS=""
          while IFS=$'\t' read -r tag type date; do
            RELEASE_ROWS="${RELEASE_ROWS}| [${tag}](${RELEASES_URL}/tag/${tag}) | ${type} | ${date} |
          "
          done < <(gh release list --repo "${REPO}" --limit 20 --json tagName,isPrerelease,publishedAt \
            --jq '.[] | [.tagName, (if .isPrerelease then "RC" else "**Stable**" end), .publishedAt[:10]] | @tsv')

          # ── RELEASES.md ──
          cat > RELEASES.md << EOF
          # Release History

          *Auto-generated by CI/CD pipeline. Do not edit manually.*

          ## Current

          | | |
          |---|---|
          | **Latest stable** | [\`${VERSION}\`](${RELEASES_URL}/tag/${VERSION}) |
          | **Date** | ${DATE} |
          | **Platforms** | \`linux/amd64\`, \`linux/arm64\` |

          ## Install

          \`\`\`bash
          for svc in load-generator load-generator-orm pgbench-runner dashboard truth-service; do
            docker pull ${GHCR}/\${svc}:${VERSION}
          done
          \`\`\`

          ## All Releases

          | Version | Type | Date |
          |---------|------|------|
          ${RELEASE_ROWS}
          EOF

          # ── README.md ──
          sed -i "s|${GHCR}/load-generator:[^ \`]*|${GHCR}/load-generator:${VERSION}|g" README.md

          # ── docs/02-quickstart.md ──
          if [ -f docs/02-quickstart.md ]; then
            sed -i "s|${GHCR}/load-generator:[^ \`]*|${GHCR}/load-generator:${VERSION}|g" docs/02-quickstart.md
          fi

          # ── docs/06-releases.md ──
          if [ -f docs/06-releases.md ]; then
            sed -i "s|${GHCR}/load-generator:[^ \`]*|${GHCR}/load-generator:${VERSION}|g" docs/06-releases.md
            sed -i "s|${GHCR}/dashboard:[^ \`]*|${GHCR}/dashboard:${VERSION}|g" docs/06-releases.md
          fi

      - name: Commit docs update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add RELEASES.md README.md docs/
          git diff --cached --quiet && exit 0
          git commit -m "docs: update release info to ${{ github.event.inputs.version }} [skip ci]"
          git push origin main
