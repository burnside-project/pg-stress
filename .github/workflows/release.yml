name: Promote to Stable Release

# Promotes a validated RC to a stable release.
# Usage: gh workflow run release.yml -f version=v1.0.0

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Stable version tag (e.g., v1.0.0)'
        required: true
        type: string

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:
  build-and-push:
    name: Build ${{ matrix.service }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: load-generator
            context: ./load-generator
          - service: load-generator-orm
            context: ./load-generator-orm
          - service: pgbench-runner
            context: ./pgbench-runner
          - service: dashboard
            context: ./dashboard
          - service: truth-service
            context: ./truth-service
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (multi-arch)
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ github.event.inputs.version }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
          labels: |
            org.opencontainers.image.version=${{ github.event.inputs.version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

  release:
    name: Create Stable Release
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Create tag
        run: |
          VERSION=${{ github.event.inputs.version }}
          if git rev-parse "$VERSION" >/dev/null 2>&1; then
            echo "Tag $VERSION already exists"
          else
            git tag "$VERSION"
            git push origin "$VERSION"
          fi

      - name: Generate release notes
        run: |
          VERSION=${{ github.event.inputs.version }}
          SEMVER="${VERSION#v}"
          PREV_TAG=$(git tag --sort=-creatordate | grep -v "$VERSION" | grep -v "\-rc" | head -1 || true)

          {
            # Extract from CHANGELOG.md if available
            if [ -f CHANGELOG.md ]; then
              NOTES=$(awk -v ver="$SEMVER" '
                /^## \[/ {
                  if (found) exit
                  if (index($0, "[" ver "]")) found=1
                  next
                }
                found { print }
              ' CHANGELOG.md)
              if [ -n "$NOTES" ]; then
                echo "${NOTES}"
                echo ""
              fi
            fi

            # Commits since last stable release
            if [ -n "$PREV_TAG" ]; then
              echo "## All changes since ${PREV_TAG}"
              echo ""
              git log ${PREV_TAG}..HEAD --pretty=format:"- %s (\`%h\`)" --no-merges | head -80
              echo ""
              echo ""
            fi

            echo "## Docker Images"
            echo ""
            echo "Multi-arch: \`linux/amd64\` + \`linux/arm64\`"
            echo ""
            echo "| Service | Pull |"
            echo "|---------|------|"
            for svc in load-generator load-generator-orm pgbench-runner dashboard truth-service; do
              echo "| ${svc} | \`docker pull ghcr.io/${{ github.repository }}/${svc}:${VERSION}\` |"
            done
            echo ""
            echo '```bash'
            echo "# Pull all images"
            echo "for svc in load-generator load-generator-orm pgbench-runner dashboard truth-service; do"
            echo "  docker pull ghcr.io/${{ github.repository }}/\${svc}:${VERSION}"
            echo "done"
            echo '```'
            echo ""
            echo "## Quick Start"
            echo ""
            echo '```bash'
            echo "git clone https://github.com/${{ github.repository }}.git"
            echo "cd pg-stress && git checkout ${VERSION}"
            echo "make up         # Core stack"
            echo "make up-full    # Everything"
            echo '```'
            echo ""
            echo "## Intensity Presets"
            echo ""
            echo '```bash'
            echo "make up INTENSITY=low      # Light load"
            echo "make up INTENSITY=medium   # Default"
            echo "make up INTENSITY=high     # Stress test"
            echo '```'
          } > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ github.event.inputs.version }}

          # Delete existing release if re-running
          gh release delete "$VERSION" --yes 2>/dev/null || true

          gh release create "$VERSION" \
            --repo ${{ github.repository }} \
            --title "pg-stress ${VERSION}" \
            --notes-file /tmp/release-notes.md \
            --target ${{ github.sha }} \
            --latest

          echo "### Stable release published: [${VERSION}](https://github.com/${{ github.repository }}/releases/tag/${VERSION})" >> $GITHUB_STEP_SUMMARY