name: Release

on:
  workflow_dispatch:
    inputs:
      type:
        description: 'Release type'
        required: true
        type: choice
        options:
          - rc
          - stable
      version:
        description: 'Version (e.g., 1.0.0). For RC: auto-increments rc1/rc2/... For stable: creates v1.0.0'
        required: true
        type: string
      branch:
        description: 'Branch to build from (default: main)'
        required: false
        default: 'main'
        type: string

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}

jobs:

  # ─── Resolve version tag ──────────────────────────────────────────────

  resolve:
    name: Resolve Version
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      is_rc: ${{ steps.resolve.outputs.is_rc }}
      rc_number: ${{ steps.resolve.outputs.rc_number }}
    steps:
      - name: Determine tag
        id: resolve
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BASE="v${{ github.event.inputs.version }}"
          TYPE="${{ github.event.inputs.type }}"

          if [ "$TYPE" == "stable" ]; then
            echo "tag=${BASE}" >> $GITHUB_OUTPUT
            echo "is_rc=false" >> $GITHUB_OUTPUT
            echo "rc_number=" >> $GITHUB_OUTPUT
            echo "### Stable release: ${BASE}" >> $GITHUB_STEP_SUMMARY
          else
            # Find highest existing RC and increment
            LATEST_RC=$(gh api repos/${{ github.repository }}/git/matching-refs/tags/${BASE}-rc \
              --jq '.[].ref' 2>/dev/null \
              | sed 's|refs/tags/||' \
              | grep -E "^${BASE}-rc[0-9]+$" \
              | sort -t'c' -k2 -n \
              | tail -1 || true)

            if [ -z "$LATEST_RC" ]; then
              RC_NUM=1
            else
              PREV_NUM=$(echo "$LATEST_RC" | grep -oP 'rc\K[0-9]+')
              RC_NUM=$((PREV_NUM + 1))
            fi

            TAG="${BASE}-rc${RC_NUM}"
            echo "tag=${TAG}" >> $GITHUB_OUTPUT
            echo "is_rc=true" >> $GITHUB_OUTPUT
            echo "rc_number=${RC_NUM}" >> $GITHUB_OUTPUT
            echo "### Release candidate: ${TAG}" >> $GITHUB_STEP_SUMMARY
          fi

  # ─── Build and push multi-arch images ─────────────────────────────────

  build:
    name: Build ${{ matrix.service }}
    needs: resolve
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: load-generator
            context: ./load-generator
          - service: load-generator-orm
            context: ./load-generator-orm
          - service: pgbench-runner
            context: ./pgbench-runner
          - service: dashboard
            context: ./dashboard
          - service: truth-service
            context: ./truth-service
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Determine image tags
        id: tags
        run: |
          TAG="${{ needs.resolve.outputs.tag }}"
          IS_RC="${{ needs.resolve.outputs.is_rc }}"
          PREFIX="${{ env.IMAGE_PREFIX }}/${{ matrix.service }}"
          if [ "$IS_RC" == "true" ]; then
            echo "tags=${PREFIX}:${TAG},${PREFIX}:rc-latest" >> $GITHUB_OUTPUT
          else
            echo "tags=${PREFIX}:${TAG},${PREFIX}:latest" >> $GITHUB_OUTPUT
          fi
      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.tags.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
          labels: |
            org.opencontainers.image.version=${{ needs.resolve.outputs.tag }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

  # ─── Publish release + update docs ────────────────────────────────────

  publish:
    name: Publish Release
    needs: [resolve, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create tag
        run: |
          TAG=${{ needs.resolve.outputs.tag }}
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists"
          else
            git tag "$TAG"
            git push origin "$TAG"
          fi

      - name: Generate release notes
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.resolve.outputs.tag }}
          IS_RC: ${{ needs.resolve.outputs.is_rc }}
          RC_NUM: ${{ needs.resolve.outputs.rc_number }}
          REPO: ${{ github.repository }}
        run: |
          BASE="v${{ github.event.inputs.version }}"
          BRANCH="${{ github.event.inputs.branch }}"
          COMMIT=${GITHUB_SHA::8}
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)

          {
            if [ "$IS_RC" == "true" ]; then
              echo "> **Release candidate for ${BASE}** — built on-demand from \`${BRANCH}\`."
              echo "> Not for production. Stable releases: [latest](https://github.com/${REPO}/releases/latest)"
              echo ""
              echo "## RC ${RC_NUM} · \`${COMMIT}\`"
              echo ""
              echo "| | |"
              echo "|---|---|"
              echo "| **Target** | \`${BASE}\` |"
              echo "| **Branch** | \`${BRANCH}\` |"
              echo "| **Commit** | [\`${COMMIT}\`](https://github.com/${REPO}/commit/${GITHUB_SHA}) |"
              echo "| **Platforms** | \`linux/amd64\`, \`linux/arm64\` |"
            else
              echo "## ${TAG}"
              echo ""

              # Extract from CHANGELOG.md if available
              SEMVER="${TAG#v}"
              if [ -f CHANGELOG.md ]; then
                NOTES=$(awk -v ver="$SEMVER" '/^## \[/{if(f)exit;if(index($0,"["ver"]"))f=1;next}f' CHANGELOG.md)
                [ -n "$NOTES" ] && echo "${NOTES}" && echo ""
              fi
            fi

            # Git changelog since last tag
            if [ -n "$PREV_TAG" ]; then
              echo ""
              echo "## Changes since ${PREV_TAG}"
              echo ""
              git log ${PREV_TAG}..HEAD --pretty=format:"- %s (\`%h\`)" --no-merges | head -50
            fi

            echo ""
            echo ""
            echo "## Docker Images"
            echo ""
            echo "Multi-arch: \`linux/amd64\` + \`linux/arm64\`"
            echo ""
            echo "| Service | Pull |"
            echo "|---------|------|"
            for svc in load-generator load-generator-orm pgbench-runner dashboard truth-service; do
              echo "| ${svc} | \`docker pull ghcr.io/${REPO}/${svc}:${TAG}\` |"
            done

            if [ "$IS_RC" == "true" ]; then
              echo ""
              echo "## Test this RC"
              echo ""
              echo '```bash'
              echo "git clone https://github.com/${REPO}.git && cd pg-stress"
              echo "git checkout ${TAG}"
              echo "make up-full"
              echo '```'
              echo ""
              echo "## Promote to stable"
              echo ""
              echo "Once validated, run the Release workflow with type=\`stable\` and version=\`${{ github.event.inputs.version }}\`"
            else
              echo ""
              echo "## Quick Start"
              echo ""
              echo '```bash'
              echo "git clone https://github.com/${REPO}.git"
              echo "cd pg-stress && git checkout ${TAG}"
              echo "make up-full"
              echo '```'
            fi
          } > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.resolve.outputs.tag }}
          IS_RC: ${{ needs.resolve.outputs.is_rc }}
        run: |
          gh release delete "$TAG" --yes 2>/dev/null || true

          FLAGS=""
          if [ "$IS_RC" == "true" ]; then
            FLAGS="--prerelease"
          else
            FLAGS="--latest"
          fi

          gh release create "$TAG" \
            --repo ${{ github.repository }} \
            --title "pg-stress ${TAG}" \
            --notes-file /tmp/release-notes.md \
            --target ${{ github.sha }} \
            $FLAGS

      - name: Update docs
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.resolve.outputs.tag }}
          IS_RC: ${{ needs.resolve.outputs.is_rc }}
          REPO: ${{ github.repository }}
        run: |
          DATE=$(date -u '+%Y-%m-%d')
          GHCR="ghcr.io/${REPO}"
          RELEASES_URL="https://github.com/${REPO}/releases"

          # ── Build release table ──
          RELEASE_ROWS=""
          while IFS=$'\t' read -r tag type date; do
            RELEASE_ROWS="${RELEASE_ROWS}| [${tag}](${RELEASES_URL}/tag/${tag}) | ${type} | ${date} |
          "
          done < <(gh release list --repo "${REPO}" --limit 20 --json tagName,isPrerelease,publishedAt \
            --jq '.[] | [.tagName, (if .isPrerelease then "RC" else "**Stable**" end), .publishedAt[:10]] | @tsv')

          STABLE=$(gh release list --repo "${REPO}" --exclude-pre-releases --limit 1 --json tagName --jq '.[0].tagName // empty' 2>/dev/null || true)

          # ── RELEASES.md ──
          {
            echo "# Release History"
            echo ""
            echo "*Auto-generated by CI/CD pipeline. Do not edit manually.*"
            echo ""
            echo "## Current"
            echo ""
            echo "| | |"
            echo "|---|---|"

            if [ "$IS_RC" == "true" ]; then
              echo "| **Latest RC** | [\`${TAG}\`](${RELEASES_URL}/tag/${TAG}) |"
              echo "| **Target** | \`v${{ github.event.inputs.version }}\` |"
            fi
            if [ -n "$STABLE" ]; then
              echo "| **Latest stable** | [\`${STABLE}\`](${RELEASES_URL}/tag/${STABLE}) |"
            fi
            echo "| **Date** | ${DATE} |"
            echo "| **Platforms** | \`linux/amd64\`, \`linux/arm64\` |"

            echo ""
            echo "## Install"
            echo ""

            if [ -n "$STABLE" ]; then
              echo '```bash'
              echo "# Stable"
              echo "for svc in load-generator load-generator-orm pgbench-runner dashboard truth-service; do"
              echo "  docker pull ${GHCR}/\${svc}:${STABLE}"
              echo "done"
              echo '```'
              echo ""
            fi

            if [ "$IS_RC" == "true" ]; then
              echo '```bash'
              echo "# Latest RC"
              echo "for svc in load-generator load-generator-orm pgbench-runner dashboard truth-service; do"
              echo "  docker pull ${GHCR}/\${svc}:${TAG}"
              echo "done"
              echo '```'
              echo ""
            fi

            echo "## All Releases"
            echo ""
            echo "| Version | Type | Date |"
            echo "|---------|------|------|"
            echo "${RELEASE_ROWS}"
          } > RELEASES.md

          # ── Update version references in all docs ──
          sed -i "s|${GHCR}/load-generator:[^ \`]*|${GHCR}/load-generator:${TAG}|g" README.md
          for f in docs/02-quickstart.md docs/06-releases.md; do
            if [ -f "$f" ]; then
              sed -i "s|${GHCR}/load-generator:[^ \`]*|${GHCR}/load-generator:${TAG}|g" "$f"
              sed -i "s|${GHCR}/dashboard:[^ \`]*|${GHCR}/dashboard:${TAG}|g" "$f"
            fi
          done

      - name: Commit docs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add RELEASES.md README.md docs/
          git diff --cached --quiet && exit 0
          git commit -m "docs: update release info to ${{ needs.resolve.outputs.tag }} [skip ci]"
          git push origin ${{ github.event.inputs.branch }}