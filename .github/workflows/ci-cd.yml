name: CI/CD

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - '*.md'
      - 'docs/**'
      - 'LICENSE'
      - '.gitignore'

permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/${{ github.repository }}
  SERVICES: load-generator load-generator-orm pgbench-runner dashboard truth-service

jobs:

  # ─── CI Gates (run on PR + push to main) ─────────────────────────────

  lint-go:
    name: Lint Go
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.23'
      - run: go vet ./...
        working-directory: ./load-generator
      - run: go build -o /dev/null .
        working-directory: ./load-generator

  lint-python:
    name: Lint Python
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install ruff
      - run: ruff check load-generator-orm/ dashboard/ truth-service/app/ --select E,F,I --ignore E501

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt pytest pytest-asyncio
        working-directory: ./truth-service
      - run: python -m pytest tests/ -v
        working-directory: ./truth-service

  validate:
    name: Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker compose config --quiet
      - run: docker compose -f docker-compose.truth.yml config --quiet
      - name: Shellcheck
        run: shellcheck scripts/*.sh pgbench-runner/entrypoint.sh || true

  build-check:
    name: Build Images
    if: github.event_name == 'pull_request'
    needs: [lint-go, lint-python, test, validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build all services
        run: |
          for ctx in load-generator load-generator-orm pgbench-runner dashboard truth-service; do
            echo "::group::Build ${ctx}"
            docker buildx build --load ./${ctx}
            echo "::endgroup::"
          done

  # ─── CD Pipeline (push to main only) ─────────────────────────────────

  resolve-rc:
    name: Resolve RC
    if: github.event_name == 'push'
    needs: [lint-go, lint-python, test, validate]
    runs-on: ubuntu-latest
    outputs:
      rc_version: ${{ steps.rc.outputs.rc_version }}
      rc_number: ${{ steps.rc.outputs.rc_number }}
      base_version: ${{ steps.rc.outputs.base_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Determine next RC
        id: rc
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BASE=$(cat VERSION | tr -d '[:space:]')
          TAG_BASE="v${BASE}"

          if gh release view "$TAG_BASE" --repo ${{ github.repository }} --json tagName --jq '.tagName' 2>/dev/null; then
            echo "::notice::Stable ${TAG_BASE} exists. Bump VERSION for new RCs."
            echo "skip=true" >> $GITHUB_OUTPUT
            exit 0
          fi

          LATEST_RC=$(gh api repos/${{ github.repository }}/git/matching-refs/tags/${TAG_BASE}-rc \
            --jq '.[].ref' 2>/dev/null \
            | sed 's|refs/tags/||' \
            | grep -E "^${TAG_BASE}-rc[0-9]+$" \
            | sort -t'c' -k2 -n \
            | tail -1 || true)

          if [ -z "$LATEST_RC" ]; then
            RC_NUM=1
          else
            PREV_NUM=$(echo "$LATEST_RC" | grep -oP 'rc\K[0-9]+')
            RC_NUM=$((PREV_NUM + 1))
          fi

          RC_VERSION="${TAG_BASE}-rc${RC_NUM}"
          echo "rc_version=${RC_VERSION}" >> $GITHUB_OUTPUT
          echo "rc_number=${RC_NUM}" >> $GITHUB_OUTPUT
          echo "base_version=${TAG_BASE}" >> $GITHUB_OUTPUT

          echo "### ${RC_VERSION}" >> $GITHUB_STEP_SUMMARY

  build-and-push:
    name: Build ${{ matrix.service }}
    needs: resolve-rc
    if: needs.resolve-rc.outputs.rc_version != ''
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: load-generator
            context: ./load-generator
          - service: load-generator-orm
            context: ./load-generator-orm
          - service: pgbench-runner
            context: ./pgbench-runner
          - service: dashboard
            context: ./dashboard
          - service: truth-service
            context: ./truth-service
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:${{ needs.resolve-rc.outputs.rc_version }}
            ${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:rc-latest
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,scope=${{ matrix.service }},mode=max
          labels: |
            org.opencontainers.image.version=${{ needs.resolve-rc.outputs.rc_version }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}

  publish-rc:
    name: Publish RC
    needs: [resolve-rc, build-and-push]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create RC tag
        run: |
          RC_VERSION=${{ needs.resolve-rc.outputs.rc_version }}
          git tag "$RC_VERSION"
          git push origin "$RC_VERSION"

      - name: Generate release notes
        run: |
          RC_VERSION=${{ needs.resolve-rc.outputs.rc_version }}
          RC_NUM=${{ needs.resolve-rc.outputs.rc_number }}
          BASE_VERSION=${{ needs.resolve-rc.outputs.base_version }}
          COMMIT=${GITHUB_SHA::8}
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || true)

          {
            echo "> **Release candidate for ${BASE_VERSION}** — built automatically from \`main\`."
            echo "> Not for production. Stable releases: [latest](https://github.com/${{ github.repository }}/releases/latest)"
            echo ""
            echo "## RC ${RC_NUM} · \`${COMMIT}\`"
            echo ""
            echo "| | |"
            echo "|---|---|"
            echo "| **Target** | \`${BASE_VERSION}\` |"
            echo "| **Commit** | [\`${COMMIT}\`](https://github.com/${{ github.repository }}/commit/${GITHUB_SHA}) |"
            echo "| **Platforms** | \`linux/amd64\`, \`linux/arm64\` |"

            if [ -n "$PREV_TAG" ]; then
              echo ""
              echo "## Changes since ${PREV_TAG}"
              echo ""
              git log ${PREV_TAG}..HEAD --pretty=format:"- %s (\`%h\`)" --no-merges | head -50
            fi

            if [ -f CHANGELOG.md ]; then
              UNRELEASED=$(awk '/^## \[Unreleased\]/{f=1;next}/^## \[/{if(f)exit}f' CHANGELOG.md)
              if [ -n "$UNRELEASED" ]; then
                echo ""
                echo "## Planned for ${BASE_VERSION}"
                echo ""
                echo "${UNRELEASED}"
              fi
            fi

            echo ""
            echo "## Docker Images"
            echo ""
            echo "Multi-arch: \`linux/amd64\` + \`linux/arm64\`"
            echo ""
            echo "| Service | Pull |"
            echo "|---------|------|"
            for svc in load-generator load-generator-orm pgbench-runner dashboard truth-service; do
              echo "| ${svc} | \`docker pull ghcr.io/${{ github.repository }}/${svc}:${RC_VERSION}\` |"
            done
            echo ""
            echo "## Test this RC"
            echo ""
            echo '```bash'
            echo "git clone https://github.com/${{ github.repository }}.git && cd pg-stress"
            echo "git checkout ${RC_VERSION}"
            echo "make up-full"
            echo '```'
            echo ""
            echo "## Promote to stable"
            echo ""
            echo '```bash'
            echo "gh workflow run release.yml --repo ${{ github.repository }} -f version=${BASE_VERSION}"
            echo '```'
          } > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ needs.resolve-rc.outputs.rc_version }}" \
            --repo ${{ github.repository }} \
            --title "pg-stress ${{ needs.resolve-rc.outputs.rc_version }}" \
            --notes-file /tmp/release-notes.md \
            --target ${{ github.sha }} \
            --prerelease

      - name: Update docs with release info
        env:
          GH_TOKEN: ${{ github.token }}
          RC_VERSION: ${{ needs.resolve-rc.outputs.rc_version }}
          BASE_VERSION: ${{ needs.resolve-rc.outputs.base_version }}
          REPO: ${{ github.repository }}
        run: |
          DATE=$(date -u '+%Y-%m-%d')
          GHCR="ghcr.io/${REPO}"
          RELEASES_URL="https://github.com/${REPO}/releases"
          STABLE=$(gh release list --repo "${REPO}" --exclude-pre-releases --limit 1 --json tagName --jq '.[0].tagName // empty' 2>/dev/null || true)

          # ── Build release table ──
          RELEASE_ROWS=""
          while IFS=$'\t' read -r tag type date; do
            RELEASE_ROWS="${RELEASE_ROWS}| [${tag}](${RELEASES_URL}/tag/${tag}) | ${type} | ${date} |
          "
          done < <(gh release list --repo "${REPO}" --limit 20 --json tagName,isPrerelease,publishedAt \
            --jq '.[] | [.tagName, (if .isPrerelease then "RC" else "**Stable**" end), .publishedAt[:10]] | @tsv')

          # ── RELEASES.md ──
          cat > RELEASES.md << EOF
          # Release History

          *Auto-generated by CI/CD pipeline. Do not edit manually.*

          ## Current

          | | |
          |---|---|
          | **Latest RC** | [\`${RC_VERSION}\`](${RELEASES_URL}/tag/${RC_VERSION}) |
          | **Target** | \`${BASE_VERSION}\` |
          | **Date** | ${DATE} |
          | **Platforms** | \`linux/amd64\`, \`linux/arm64\` |
          EOF

          if [ -n "$STABLE" ]; then
            echo "| **Latest stable** | [\`${STABLE}\`](${RELEASES_URL}/tag/${STABLE}) |" >> RELEASES.md
          fi

          cat >> RELEASES.md << EOF

          ## Install

          \`\`\`bash
          # Latest RC
          for svc in load-generator load-generator-orm pgbench-runner dashboard truth-service; do
            docker pull ${GHCR}/\${svc}:${RC_VERSION}
          done
          \`\`\`
          EOF

          if [ -n "$STABLE" ]; then
            cat >> RELEASES.md << EOF

          \`\`\`bash
          # Latest stable
          for svc in load-generator load-generator-orm pgbench-runner dashboard truth-service; do
            docker pull ${GHCR}/\${svc}:${STABLE}
          done
          \`\`\`
          EOF
          fi

          cat >> RELEASES.md << EOF

          ## All Releases

          | Version | Type | Date |
          |---------|------|------|
          ${RELEASE_ROWS}
          EOF

          # ── README.md — update pinned version in install section ──
          sed -i "s|${GHCR}/load-generator:[^ \`]*|${GHCR}/load-generator:${RC_VERSION}|g" README.md

          # ── docs/02-quickstart.md — update pull commands ──
          if [ -f docs/02-quickstart.md ]; then
            sed -i "s|${GHCR}/load-generator:[^ \`]*|${GHCR}/load-generator:${RC_VERSION}|g" docs/02-quickstart.md
          fi

          # ── docs/06-releases.md — update example versions ──
          if [ -f docs/06-releases.md ]; then
            sed -i "s|${GHCR}/load-generator:[^ \`]*|${GHCR}/load-generator:${RC_VERSION}|g" docs/06-releases.md
            sed -i "s|${GHCR}/dashboard:[^ \`]*|${GHCR}/dashboard:${RC_VERSION}|g" docs/06-releases.md
          fi

      - name: Commit docs update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add RELEASES.md README.md docs/
          git diff --cached --quiet && exit 0
          git commit -m "docs: update release info to ${{ needs.resolve-rc.outputs.rc_version }} [skip ci]"
          git push origin main
