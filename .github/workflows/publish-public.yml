name: Publish to Public Repo

# Manual trigger only — pushes current main to burnside-project/pg-stress
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Confirm publish to burnside-project/pg-stress'
        required: true
        type: choice
        options:
          - 'no'
          - 'publish'
      branch:
        description: 'Branch to publish'
        required: true
        default: 'main'

jobs:
  publish:
    name: Push to burnside-project/pg-stress
    runs-on: ubuntu-latest
    if: ${{ inputs.confirm == 'publish' }}

    steps:
      - name: Checkout source repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}
          fetch-depth: 0  # Full history for clean push

      - name: Configure git
        run: |
          git config user.name "Burnside Project Bot"
          git config user.email "bot@burnsideproject.ai"

      - name: Verify token
        env:
          PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          if [ -z "$PUBLIC_REPO_TOKEN" ]; then
            echo "ERROR: PUBLIC_REPO_TOKEN is empty!"
            exit 1
          fi
          echo "Token length: ${#PUBLIC_REPO_TOKEN} chars"
          echo "Token prefix: ${PUBLIC_REPO_TOKEN:0:4}..."

      - name: Push to public repo
        env:
          PUBLIC_REPO_TOKEN: ${{ secrets.PUBLIC_REPO_TOKEN }}
        run: |
          # Clear the credential helper set by actions/checkout (it overrides our token)
          git config --unset-all http.https://github.com/.extraheader || true
          git config --unset-all credential.helper || true

          # Set our token as the credential
          git remote add public https://x-access-token:${PUBLIC_REPO_TOKEN}@github.com/burnside-project/pg-stress.git

          # Push the branch
          BRANCH="${{ inputs.branch }}"
          echo "Publishing ${BRANCH} to burnside-project/pg-stress..."
          git push public ${BRANCH} --force

          echo ""
          echo "✅ Published to https://github.com/burnside-project/pg-stress"
          echo "   Branch: ${BRANCH}"
          echo "   Commit: $(git rev-parse --short HEAD)"
          echo "   Message: $(git log -1 --pretty=%s)"

      - name: Summary
        run: |
          echo "## Published to Public Repo" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **Source** | burnside-project/pg-stress |" >> $GITHUB_STEP_SUMMARY
          echo "| **Target** | burnside-project/pg-stress |" >> $GITHUB_STEP_SUMMARY
          echo "| **Branch** | ${{ inputs.branch }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`$(git rev-parse --short HEAD)\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Message** | $(git log -1 --pretty=%s) |" >> $GITHUB_STEP_SUMMARY
