# Burnside Project Test Suite — Unified Stack
#
# Profiles:
#   (none)    → core: postgres + load-generator + dashboard
#   orm       → core + ORM load generator (SQLAlchemy)
#   pgbench   → core + pgbench comparison runner
#   collector → core + pg-collector + truth-service
#   full      → everything
#
# Usage:
#   docker compose up --build -d                          # core only
#   docker compose --profile orm up --build -d            # core + ORM
#   docker compose --profile pgbench up --build -d        # core + pgbench
#   docker compose --profile full up --build -d           # everything

services:

  # ════════════════════════════════════════════════════════════════════════
  # PostgreSQL — shared database for all generators and observers
  # ════════════════════════════════════════════════════════════════════════

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-postgres}
      POSTGRES_DB: ${PG_DATABASE:-testdb}
      SEED_SCHEMA: ${SEED_SCHEMA:-true}
    command:
      - "postgres"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "pg_stat_statements.track=all"
      - "-c"
      - "pg_stat_statements.max=10000"
      - "-c"
      - "track_activities=on"
      - "-c"
      - "track_counts=on"
      - "-c"
      - "track_io_timing=on"
      - "-c"
      - "track_wal_io_timing=on"
      - "-c"
      - "track_functions=all"
      - "-c"
      - "max_connections=${PG_MAX_CONNECTIONS:-200}"
      - "-c"
      - "shared_buffers=${PG_SHARED_BUFFERS:-256MB}"
      - "-c"
      - "work_mem=${PG_WORK_MEM:-16MB}"
      - "-c"
      - "effective_cache_size=${PG_EFFECTIVE_CACHE_SIZE:-1GB}"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "max_wal_size=2GB"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "log_statement=none"
      - "-c"
      - "log_min_duration_statement=1000"
      - "-c"
      - "log_checkpoints=on"
      - "-c"
      - "log_lock_waits=on"
      - "-c"
      - "log_autovacuum_min_duration=250"
      - "-c"
      - "autovacuum_max_workers=4"
      - "-c"
      - "autovacuum_naptime=30s"
    ports:
      - "${PG_PORT:-5434}:5432"
    volumes:
      - stress-pg-data:/var/lib/postgresql/data
      - ./load-generator/schema.sql:/docker-entrypoint-initdb.d/seed/schema.sql:ro
      - ./configs/postgres/init-schema.sh:/docker-entrypoint-initdb.d/01-init-schema.sh:ro
      - ./configs/postgres/pg_hba.conf:/etc/postgresql/pg_hba.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres} -d ${PG_DATABASE:-testdb}"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - stress-net
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  # ════════════════════════════════════════════════════════════════════════
  # Raw SQL Load Generator (Go + pgx)
  # ════════════════════════════════════════════════════════════════════════

  load-generator:
    build:
      context: ./load-generator
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PG_CONN: "postgres://${PG_USER:-postgres}:${PG_PASSWORD:-postgres}@postgres:5432/${PG_DATABASE:-testdb}?sslmode=disable"
      LOADGEN_DURATION: "${LOADGEN_DURATION:-0}"
      LOADGEN_MIX_BROWSE: "${LOADGEN_MIX_BROWSE:-50}"
      LOADGEN_MIX_CART: "${LOADGEN_MIX_CART:-20}"
      LOADGEN_MIX_CHECKOUT: "${LOADGEN_MIX_CHECKOUT:-5}"
      LOADGEN_MIX_ORDER: "${LOADGEN_MIX_ORDER:-10}"
      LOADGEN_MIX_BACKGROUND: "${LOADGEN_MIX_BACKGROUND:-10}"
      LOADGEN_MIX_REPORTING: "${LOADGEN_MIX_REPORTING:-5}"
      LOADGEN_BURST_LOW_CONNS: "${LOADGEN_BURST_LOW_CONNS:-5}"
      LOADGEN_BURST_LOW_DURATION: "${LOADGEN_BURST_LOW_DURATION:-10s}"
      LOADGEN_BURST_LOW_WEIGHT: "${LOADGEN_BURST_LOW_WEIGHT:-50}"
      LOADGEN_BURST_MED_CONNS: "${LOADGEN_BURST_MED_CONNS:-20}"
      LOADGEN_BURST_MED_DURATION: "${LOADGEN_BURST_MED_DURATION:-30s}"
      LOADGEN_BURST_MED_WEIGHT: "${LOADGEN_BURST_MED_WEIGHT:-35}"
      LOADGEN_BURST_HEAVY_CONNS: "${LOADGEN_BURST_HEAVY_CONNS:-50}"
      LOADGEN_BURST_HEAVY_DURATION: "${LOADGEN_BURST_HEAVY_DURATION:-60s}"
      LOADGEN_BURST_HEAVY_WEIGHT: "${LOADGEN_BURST_HEAVY_WEIGHT:-15}"
      LOADGEN_CHAOS_ENABLED: "${LOADGEN_CHAOS_ENABLED:-true}"
      LOADGEN_CHAOS_PROBABILITY: "${LOADGEN_CHAOS_PROBABILITY:-25}"
      LOADGEN_PAUSE_MIN: "${LOADGEN_PAUSE_MIN:-20}"
      LOADGEN_PAUSE_MAX: "${LOADGEN_PAUSE_MAX:-90}"
      LOADGEN_MAX_POOL: "${LOADGEN_MAX_POOL:-60}"
    networks:
      - stress-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "3"

  # ════════════════════════════════════════════════════════════════════════
  # Dashboard — real-time monitoring UI
  # ════════════════════════════════════════════════════════════════════════

  dashboard:
    build:
      context: ./dashboard
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      STRESS_PG_HOST: postgres
      STRESS_PG_PORT: "5432"
      STRESS_PG_USER: ${PG_USER:-postgres}
      STRESS_PG_PASSWORD: ${PG_PASSWORD:-postgres}
      STRESS_PG_DATABASE: ${PG_DATABASE:-testdb}
      STRESS_LOADGEN_URL: "http://load-generator:9090"
      STRESS_SCENARIO_PATH: "/etc/stress/scenario.yaml"
      STRESS_POLL_INTERVAL_SECONDS: "${STRESS_POLL_INTERVAL:-10}"
      STRESS_SAFETY_CHECK_INTERVAL_SECONDS: "${STRESS_SAFETY_INTERVAL:-30}"
      STRESS_MAX_DATABASE_SIZE_BYTES: "${STRESS_MAX_DB_SIZE:-20000000000}"
      STRESS_LIMIT_SEARCH_LOG: "${STRESS_LIMIT_SEARCH_LOG:-5000000}"
      STRESS_LIMIT_AUDIT_LOG: "${STRESS_LIMIT_AUDIT_LOG:-5000000}"
      STRESS_LIMIT_PRICE_HISTORY: "${STRESS_LIMIT_PRICE_HISTORY:-2000000}"
      STRESS_LIMIT_CART_ITEMS: "${STRESS_LIMIT_CART_ITEMS:-1000000}"
      STRESS_LIMIT_REVIEWS: "${STRESS_LIMIT_REVIEWS:-5000000}"
    volumes:
      - ./scenarios/${SCENARIO:-default}.yaml:/etc/stress/scenario.yaml:ro
    ports:
      - "${DASHBOARD_PORT:-8200}:8000"
    networks:
      - stress-net
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "3"

  # ════════════════════════════════════════════════════════════════════════
  # ORM Load Generator (Python + SQLAlchemy) — profile: orm
  # ════════════════════════════════════════════════════════════════════════

  load-generator-orm:
    build:
      context: ./load-generator-orm
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PG_CONN: "postgresql://${PG_USER:-postgres}:${PG_PASSWORD:-postgres}@postgres:5432/${PG_DATABASE:-testdb}"
      ORM_CONCURRENCY: "${ORM_CONCURRENCY:-5}"
      ORM_DURATION: "${ORM_DURATION:-0}"
      ORM_PAUSE_MIN: "${ORM_PAUSE_MIN:-10}"
      ORM_PAUSE_MAX: "${ORM_PAUSE_MAX:-50}"
      ORM_MIX_N_PLUS_1: "${ORM_MIX_N_PLUS_1:-15}"
      ORM_MIX_EAGER_JOIN: "${ORM_MIX_EAGER_JOIN:-15}"
      ORM_MIX_EAGER_SUBQUERY: "${ORM_MIX_EAGER_SUBQUERY:-10}"
      ORM_MIX_EAGER_SELECTIN: "${ORM_MIX_EAGER_SELECTIN:-10}"
      ORM_MIX_BULK_INSERT: "${ORM_MIX_BULK_INSERT:-5}"
      ORM_MIX_ORM_UPDATE: "${ORM_MIX_ORM_UPDATE:-10}"
      ORM_MIX_PAGINATION: "${ORM_MIX_PAGINATION:-10}"
      ORM_MIX_AGGREGATION: "${ORM_MIX_AGGREGATION:-10}"
      ORM_MIX_EXISTS_FILTER: "${ORM_MIX_EXISTS_FILTER:-10}"
      ORM_MIX_RELATIONSHIP: "${ORM_MIX_RELATIONSHIP:-5}"
      ORM_STATS_INTERVAL: "${ORM_STATS_INTERVAL:-30}"
    ports:
      - "${ORM_HEALTHZ_PORT:-9091}:9091"
    networks:
      - stress-net
    restart: unless-stopped
    profiles:
      - orm
      - full
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "3"

  # ════════════════════════════════════════════════════════════════════════
  # pgbench Runner — benchmark comparison — profile: pgbench
  # ════════════════════════════════════════════════════════════════════════

  pgbench-runner:
    build:
      context: ./pgbench-runner
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_USER: ${PG_USER:-postgres}
      PG_DB: ${PG_DATABASE:-testdb}
      PGPASSWORD: ${PG_PASSWORD:-postgres}
      PGBENCH_CLIENTS: "${PGBENCH_CLIENTS:-10}"
      PGBENCH_THREADS: "${PGBENCH_THREADS:-2}"
      PGBENCH_DURATION: "${PGBENCH_DURATION:-300}"
      PGBENCH_SCALE: "${PGBENCH_SCALE:-100}"
      PGBENCH_MODE: "${PGBENCH_MODE:-mixed}"
      PGBENCH_WARMUP: "${PGBENCH_WARMUP:-30}"
      PGBENCH_KEEP_ALIVE: "${PGBENCH_KEEP_ALIVE:-false}"
      PGBENCH_OUTPUT_DIR: /out
    volumes:
      - pgbench-results:/out
    networks:
      - stress-net
    profiles:
      - pgbench
      - full
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "3"

  # ════════════════════════════════════════════════════════════════════════
  # Control Plane — orchestration API for WHAT IF scenarios + analyzer
  # ════════════════════════════════════════════════════════════════════════

  control-plane:
    build:
      context: ./control-plane
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PG_HOST: postgres
      PG_DISPLAY_HOST: "${PG_HOST:-localhost}"
      PG_PORT: "5432"
      PG_EXTERNAL_PORT: "${PG_PORT:-5434}"
      PG_USER: ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD:-postgres}
      PG_DATABASE: ${PG_DATABASE:-testdb}
      COMPOSE_PROJECT: pg-stress
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
      REPORTS_DIR: /app/reports
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - .:/app/project
      - ./analyzer:/app/analyzer:ro
      - control-plane-reports:/app/reports
    ports:
      - "${CONTROL_PLANE_PORT:-8100}:8100"
    networks:
      - stress-net
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "3"

  # ════════════════════════════════════════════════════════════════════════
  # UI — Next.js control panel
  # ════════════════════════════════════════════════════════════════════════

  ui:
    build:
      context: ./ui
    ports:
      - "${UI_PORT:-3100}:3100"
    networks:
      - stress-net
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "2"

  # ════════════════════════════════════════════════════════════════════════
  # pg-collector — metrics collection — profile: collector
  # ════════════════════════════════════════════════════════════════════════

  collector:
    build:
      context: ../burnside-project-collector-agent
      dockerfile: Dockerfile
      args:
        BUILD_MODE: demo
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      COLLECTOR_CONFIG_PATH: /etc/pg-collector/config.yaml
    volumes:
      - ./configs/collector/truth.yaml:/etc/pg-collector/config.yaml:ro
      - collector-output:/data/collector-output
    ports:
      - "${COLLECTOR_PORT:-8080}:8080"
    networks:
      - stress-net
    profiles:
      - collector
      - full
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "3"

  # ════════════════════════════════════════════════════════════════════════
  # Truth Service — metric verification — profile: collector
  # ════════════════════════════════════════════════════════════════════════

  truth-service:
    build:
      context: ./truth-service
    depends_on:
      postgres:
        condition: service_healthy
      collector:
        condition: service_started
    environment:
      TRUTH_PG_HOST: postgres
      TRUTH_PG_PORT: "5432"
      TRUTH_PG_USER: ${PG_USER:-postgres}
      TRUTH_PG_PASSWORD: ${PG_PASSWORD:-postgres}
      TRUTH_PG_DATABASE: ${PG_DATABASE:-testdb}
      TRUTH_COLLECTOR_OUTPUT_PATH: /data/collector-output
    volumes:
      - collector-output:/data/collector-output:ro
    ports:
      - "${TRUTH_PORT:-8001}:8000"
    networks:
      - stress-net
    profiles:
      - collector
      - full
    deploy:
      resources:
        limits:
          memory: 256M
    logging:
      driver: json-file
      options:
        max-size: "25m"
        max-file: "3"

  # ════════════════════════════════════════════════════════════════════════
  # AI Analyzer — Claude-powered test analysis — profile: analyze
  # ════════════════════════════════════════════════════════════════════════

  analyzer:
    build:
      context: ./analyzer
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_USER: ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD:-postgres}
      PG_DATABASE: ${PG_DATABASE:-testdb}
      ANTHROPIC_API_KEY: "${ANTHROPIC_API_KEY:-}"
    volumes:
      - ./out:/app/out
    networks:
      - stress-net
    profiles:
      - analyze
      - full
    deploy:
      resources:
        limits:
          memory: 256M

networks:
  stress-net:
    driver: bridge

volumes:
  stress-pg-data:
  collector-output:
  pgbench-results:
  control-plane-reports:
