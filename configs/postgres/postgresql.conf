# Burnside Test Suite — Tuned PostgreSQL Configuration
# Optimized for OLTP stress testing with pg-collector observation.
#
# Mount into the postgres container at /etc/postgresql/conf.d/tuning.conf
# or pass individual values via docker-compose command args.

# ─── Memory ──────────────────────────────────────────────────────────────
shared_buffers = 256MB
effective_cache_size = 1GB
work_mem = 16MB
maintenance_work_mem = 128MB
temp_buffers = 16MB

# ─── Connections ─────────────────────────────────────────────────────────
max_connections = 200
superuser_reserved_connections = 3

# ─── WAL ─────────────────────────────────────────────────────────────────
wal_buffers = 16MB
checkpoint_completion_target = 0.9
max_wal_size = 2GB
min_wal_size = 512MB

# ─── Query Planner ───────────────────────────────────────────────────────
random_page_cost = 1.1
effective_io_concurrency = 200
default_statistics_target = 200

# ─── Monitoring (required for pg-collector) ──────────────────────────────
shared_preload_libraries = 'pg_stat_statements'
pg_stat_statements.track = all
pg_stat_statements.max = 10000
track_activities = on
track_counts = on
track_io_timing = on
track_wal_io_timing = on
track_functions = all

# ─── Logging ─────────────────────────────────────────────────────────────
log_statement = none
log_min_duration_statement = 1000
log_checkpoints = on
log_lock_waits = on
log_temp_files = 0
log_autovacuum_min_duration = 250

# ─── Autovacuum ──────────────────────────────────────────────────────────
autovacuum_max_workers = 4
autovacuum_naptime = 30s
autovacuum_vacuum_threshold = 50
autovacuum_vacuum_scale_factor = 0.05
autovacuum_analyze_threshold = 50
autovacuum_analyze_scale_factor = 0.02
